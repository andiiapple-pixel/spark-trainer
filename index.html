<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App identity -->
    <title>Spark Trainer</title>
    <meta name="description" content="AI-powered personal trainer. Custom workouts, real-time coaching, and progress tracking." />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS standalone tweaks -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spark" />

    <!-- Open Graph -->
    <meta property="og:title" content="Spark Trainer" />
    <meta property="og:description" content="AI-powered personal trainer. Custom workouts, real-time coaching, and progress tracking." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/og-image.png" />

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
