services:
  - type: web
    name: spark-trainer-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: spark-trainer-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: BCRYPT_ROUNDS
        value: 12
      - key: CLIENT_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: APP_NAME
        value: Spark Trainer
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: spark-trainer-db
    plan: free
    databaseName: spark_trainer
    postgresMajorVersion: "16"
